front:
  text: 上清侍帝晨桐栢真人真圖讃養六
  hash: sha256:f9996df409ea5237dac99e97f02d885446794fe8589cec1deff713726572a877
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0317_SJB_000-110157c, image: sjb/11/110157c.png}
body:
  text: 天台白雲司馬承禎録夫得道成真有隱有顯躋神化質多術多途大茅君辭親入嶽仙業備而歸來坐致旍輿白日輕舉髙丘子解形避世丹藥就而不返行馭龍鶴遯景潜昇見靈妙者以奬諸道學之勤混者以息其生離之望或命分有照冥之異事不可違或性樂有語黙之殊理從自適古仙出處兼此顯晦時人記傳罕能詳測故迹有再三述有前後會通機變方知至妙焉桐栢真人王君即周靈王之太子子晉也按史記云太子聖而早卒據列仙傳曰隠而登仙兩說不同盖有由矣司馬公述乎國史劉子政驗以道書國史載其前卒之蹤道書著其後仙之事真仙相反尚見異於同時彼我相違況與懸於数紀且其特禀靈氣已積習於前生假孕人胎暫應身於此世幼而通聖是習性之久也誕而有髭是身貌之昔也鍊神入微讁仙促限知賔帝之一舉期師曠於三載説賔帝乃沖形之㫖豈肯沈魂誡師曠慎不壽之言明知弗天良以早斃人間遽還仙境輕此儲位重彼真仙遊洛川以佇懷暢笙歌之𨓜韻感浮丘而降接傳出世之竒方故能蜕形示終隱山學道振羽之日謝時冲天其初卒後仙亦不足疑怪也是以京陵之墓經古啓而劎飛緱氏之祠迄今立而神在化昇之致事理昭然承禎早處嵩嶽慕山林之抗迹毎謁堂廟欽影響之餘靈對風景而虚心懷七日之如昨瞻雲天而悠思仰三清之又玄復以玉晨䇿命當侍弼之榮秩金庭宰職赴桐栢之名山五嶽是司群神所奉八洞交會諸仙遊集周紫陽受素奏之符夏明晨禀黄水之法宻契者傳祕訣於同道歸誠者告幽遯之殊庭靈墟信竒丹水濟成神之域福地旌異黄雲靄不死之郷林宇巖房存諸栖憩石梁峯闕紀其登遊所以負笈幽尋爲室靜處希夷尚閟視聽罕通乃觀仙傳追伊洛之發迹復披真誥慕華陽之降形輕運丹青敬載圖象敢爲讃述庶表誠心方以焚香啓翫窺天洞於素牒聽氣内思奉光儀於絳府自以在世迄于昇真凡有一十一圖纂成一卷上清侍帝晨領五嶽司右弼桐栢真人王仙君真圖讃第一周靈王二十三年榖洛二水闘將毀王宮王欲壅之太子諫曰不可晉聞古之長民者不墮山不崇藪不防川不竇澤又曰其興者必有夏吕之功焉其廢者必有共鯀之敗焉今吾執政無乃實有所辟而滑大二川之神使至於爭明以妨王宫王而飾之無乃不可乎又曰佐饗者嘗佐闘者傷王將防闘川以飾宫是佐闘也其無乃章禍且遇傷乎自我先王厲宣幽平而貪天禍至于今未弭我又章之懼長及子孫王室其愈卑乎王卒壅之其後景王多寵人亂於是乎始生景王崩王室大亂及貞定王王室遂卑圖畫周朝宮闕作榖洛二水相合而闘稍毀宮城處人夫負土欲壅此川作太子具冠服立於靈王前諫事讃曰禀神幼聖繼明英聦咨諫壅水切淨飾宫如何不納更事修崇預言禍敗果致卑窮第二晉平公使叔譽于周見太子與之言五稱三窮逡廵而退其言不遂歸告公曰太子行年十五而臣不能與言又師曠曰臣請瞑而徃與之言旣至乃問君子之行堯舜之德又問王侯君何以爲尊何以爲下又問温恭敦敏方德不改開物於初下學以起上登帝晨乃參天子自古誰也太子皆應聲而答辯扸明理師曠罄然舉躅其足曰善哉善哉乃蹷然而起曰瞑臣請歸太子問曰聞女知人年長短希我告也師曠曰女聲清汙女色赤白火色不壽太子曰後三年上賔於帝所女慎無言殃將及女師曠歸未三年而卒圖畫東宫殿宇作太子坐處與叔譽師曠問答事其師曠乃舉躅其足讃曰學聚該洞辯物談述叔譽斯窮師曠匪詰隱妙神性謬測聲質賔帝有期瞑臣詎悉太子絳袍皂缘二從人一紫一黄装次一人青彩皂緣白繫腰第三列仙傳曰太子好吹笙作鳯凰鳴遊伊洛之間道士浮丘公接上嵩髙山者此時浮丘公初降授以祕術修習旣成擬託卒尸解所以預言於師曠有三年之期圖畫太子吹笙遊於伊洛間道士浮丘公降接之事讃曰位寓儲宫字著仙閣志淩雲漢迹厭城郭學鳳調篁思真佇洛浮丘降授解形是託第四與師曠言云後三年上賔於帝所者謂三年之内必先尸解方乃上賔於帝故通而預言耳於是宻蛻解形空留劔舄潜冥真體隱適嵩山使親忘我難故示終以絶思爲道旣不易故積學以登仙圖晝宫殿作太子臥卒形群臣嚬泣事及太子共浮丘公東南行向嵩髙山事讃曰劔杖有術符藥多方代形未化蛻質黙詳尋師道長辭親愛忘隱山自逸瘞墓徒傷第五傳曰浮丘公接上嵩髙三十餘年後求之於山見桓良曰告我家七月七日待我於緱氏山頭者太子隠於嵩髙師於浮丘公精思以鍊神餌藥以變質道業旣就仙舉有期乃出見桓良令報我家也圖畫嵩髙山作修學巖林居處巖中有經書丹竈浮丘公坐在其中巖前作壇王君坐在壇上焼香精思事又王君岀於山次見桓良共語事讃曰棲山隱跡學道鍊形年淹數紀業契群靈告期七日將邁三清桓良返報周國待迎第六傳曰果乘白鶴駐山巔望之不得到舉手謝時人數日而去立祠於緱氏山者此則初卒而隠後仙而顯神化無方靈變自適也故能降謝緱氏舉手留情上登雲天沖鶴滅景時人永慕於餘跡祠宇以存之靈像可傳於後世神氣而在焉師曠不壽之語彼類於蜉蝣太子賔帝之言此可明於龜鶴矣圖畫王君乗鶴駐在緱氏山頭舉手謝時人并作周國帝王儀仗及時人衆等望不得到及王君控鶴昇天事讃曰傾人國内駐鶴山巔遥謝舉手永絶歸年留情数日沖景三天孤軒暢遠衆被悲旋第七上清天髙聖太上玉晨玄皇大道君爲萬道之主諸真之所尊奉世學之所宗禀得道登仙者必詣金闕而朝拜受事焉於是分司列位隨徳業之髙卑章服法儀因品秩以班錫故冠帔殊製旙節異色輿盖各形龍鶴分馭咸有等差以資升降王君是焉敬承聖㫖圖畫天上上清宫闕作道君形像仙真侍衞作二童側立共捧案案上有玉策并作一真人側立宣付王君讃曰形聲入妙道備登真奉朝金闕禀䇿玉晨德業爰叙職位攸遵二儀齊奉萬劫凝神第八王君於金闕拜受䇿命號曰侍帝晨領五嶽司右弼王桐栢真人旣承聖㫖將赴洞宮羽節導前霓旌從後龍輿降翥鶴轡迴翔神仙侍衞笙璈奏樂下太清而乗雲指洞霄而穩駕諒道氣之靈景真儀之盛觀也圖畫王君乗雲車羽盖仙靈侍從旌節導引龍鶴飛翔從天而降欲赴桐栢山洞宫事讃曰班錫所禀羽儀咸備雲景浮軒龍鶴騁轡旍節導從雲仙會萃自天乗階瞻山赴位第九天台山一名桐栢棲山山有洞府號曰金庭宫精暉伏晨光照洞域瓊臺玉室瑩朗軒庭泉則石髓金精樹則蘇牙琳碧信謂飬真之福境成神之靈墟也王君處焉以理幽顯侍弼帝晨有時朝奉領司諸嶽群神於兹受事矣圖畫桐栢山作金庭洞宮王君坐在宮中衆仙侍衞并五嶽君各領佐命等百神來拜謁讃曰山有玉洞宮曰金庭九天通象三晨伏精侍帝斯任弼王所貞領司五嶽統御百靈第十紫陽真人周季山昔入桐栢山見真人王君授以素奏丹符又明晨侍郎夏馥入桐栢山遇真人王君授黄水雲漿之法圖畫真人周季山作道士服於桐栢山見真人王君王君以左手執素奏丹符欲付周君周君長跪而受之作夏馥著古人衣遇見王君王君把一卷書欲付馥馥長跪舉兩手受之其周夏二人皆作山人裝束各作一笈解在其人邊石上著跪於王君王君作真人衣服并有三五箇仙人侍在左右讃曰周君訪道丹符見授夏氏求仙黄水之究鍊形竒術非師不就幽感爰通冥期可候第十一晉興寧三年有學道者楊君處於茅山精思所感多有諸真降授以其年六月二十六日桐栢真人王君共諸真降於楊之所居而未與之言楊君記曰有一人年甚少整頓非常建芙蓉冠着朱衣以白珠綴衣縫帶劔多論金庭山事於後又降告曰夫八朗四極靈岸遼遐竒言吐頴瓊音燦振晨飛淩霄清玄氣赴授職玉虚心遺艱鋒沈滯於眇羅之外凝和于寂波之表若此者必能旋騰寥漢周歷真庭矣三元可得而見降名可得而立耳如其心併𠎝浪目擊色袂動與網罟共啓靜與爭競之分者此乃適仙路邈求生日闊也子其慎之又降曰有道者皆當深研靈奥棲心事外但思味勤篤糟粕餘物亦是享耳又降有歌述等詞此不備載圖畫茅山楊君學道壇宇處王真人降見着芙蓉冠絳衣白珠綴衣縫帶劔楊君把紙筆附前而書其衣作真仙之製其劔𤿨依經中様式讃曰真仙匪遥感通惟宻應彼幽志降兹靈質誡訓著言詠歌兼述見景非久沖真返一上清侍帝晨桐柏真人真圖讃終
